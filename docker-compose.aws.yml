# Production stack for AWS EC2 (or any Docker host).
# DB stays on Neon (or RDS) — only UI + API run in containers.
#
# Usage:
#   1. Copy .env.aws.example → .env.aws and fill in values
#   2. docker compose -f docker-compose.aws.yml --env-file .env.aws up -d --build

services:
  api:
    build:
      context: ./gatepass-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PGSSL: ${PGSSL:-true}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PORT: "3000"
    ports:
      - "80:3000"
    depends_on:
      api:
        condition: service_healthy
